# Root Logger
rootLogger.level = ERROR
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = console

# Console Appender
appender.console.name = console
appender.console.type = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} %-5p [%t] %c{1} - %m%n

# --- Rama Suppression ---
# Your logs showed 'rpl.rama', but make sure 'com.rpl.rama' is also caught
logger.rama.name = com.rpl.rama
logger.rama.level = ERROR
logger.rama.additivity = false

logger.rpl.name = rpl
logger.rpl.level = ERROR
logger.rpl.additivity = false

# --- Netty Suppression (Source of "Using SLF4J..." logs) ---
logger.netty.name = io.netty
logger.netty.level = ERROR
logger.netty.additivity = false

# --- RDF4J Suppression ---
logger.rdf4j.name = org.eclipse.rdf4j
logger.rdf4j.level = WARN
logger.rdf4j.additivity = false

# --- Rama-Sail Logging ---
# Set to DEBUG or TRACE for detailed query/statement logging
# WARN level shows only fallbacks and unsupported operations
logger.ramasail.name = rama-sail
logger.ramasail.level = WARN
logger.ramasail.additivity = false
logger.ramasail.appenderRefs = console
logger.ramasail.appenderRef.console.ref = console